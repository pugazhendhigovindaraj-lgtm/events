<nav class="navbar">
  <div class="logo">
    <img src="images/logo.jpeg" alt="CampusEvents logo" />

<div class="login-wrap">
  <div class="login-card">
    <div class="logo">
      <img src="images/logo.jpeg" alt="CampusEvents logo" />
      Campus<span>Events</span>
    </div>
    <h2>Admin Login</h2>
    <p class="sub">Sign in to manage events and registrations.</p>

    <div id="loginMsg"></div>

    

    <form action="login.php" method="POST">
      <div class="form-group">
        <label>Email</label>
        <input type="email"
        name="email"
       placeholder="College Email"
       required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password"
        name="password"
        placeholder="Password"
        required>
      </div>
      <button type="submit" class="btn" style="width:100%">
        Sign In
      </button>
      <div style="text-align:center; margin-top:15px;">
        <span>New Admin?</span>
        <a href="admin-register.html"
        style="color:#6c63ff; font-weight:bold; text-decoration:none;">
        Register Here
      </a>
</div>
    </form>

    <div class="login-hint">
      Demo credentials — Username: <strong>admin</strong> &nbsp; Password: <strong>campus2026</strong>
    </div>
  </div>
