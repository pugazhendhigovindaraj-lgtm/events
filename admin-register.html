<!DOCTYPE html>
<html>
<head>
    <title>Admin Register</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="login-wrap">
    <div class="login-card">

        <div class="logo">
            <img src="images/logo.jpeg" alt="CampusEvents logo">
            Campus <span>Events</span>
        </div>

        <h2>College Admin Registration</h2>

        <p class="sub">Create a new admin account</p>

        <form action="admin-register.php" method="POST">

            <div class="form-group">
                <input type="text" name="college"
                    placeholder="College Name" required>
            </div>

            <div class="form-group">
                <input type="text" name="name"
                    placeholder="Admin Name" required>
            </div>

            <div class="form-group">
                <input type="email" name="email"
                    placeholder="College Email" required>
            </div>

            <div class="form-group">
                <input type="password" name="password"
                    placeholder="Password" required>
            </div>

            <button type="submit" class="btn" style="width:100%">
                Register
            </button>

        </form>

        <div class="login-hint">
            Already have an account?
            <a href="admin-login.html">
                <strong>Admin Login</strong>
            </a>
        </div>

    </div>
</div>



</body>
</html>
