<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Event Details - CampusEvents</title>
<link rel="stylesheet" href="css/style.css" />
<link rel="icon" type="image/jpeg" href="images/logo.jpeg" />
</head>
<body>

<nav class="navbar">
  <div class="logo">
    <img src="images/logo.jpeg" alt="CampusEvents logo" />
    Campus<span>Events</span>
  </div>
  <button class="menu-toggle" aria-label="Toggle navigation">☰</button>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="events.html" class="active">Events</a>
    <a href="register.html">Register</a>
    <a href="admin.html">Admin</a>
  </div>
</nav>

<section class="details-hero" id="detailsHero">
  <h1 id="evtTitle">Loading...</h1>
  <p id="evtTag"></p>
</section>

<div class="container" id="detailsContainer">
  <!-- filled by JS -->
</div>

<footer>
  &copy; 2026 CampusEvents Portal. Built for Web Development Internship — Wyntrix Innovation OPC Pvt Ltd.
</footer>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script>
  const id = getParam("id");
  const event = DB.getEvent(id);
  const container = document.getElementById("detailsContainer");

  if (!event) {
    document.getElementById("evtTitle").textContent = "Event Not Found";
    container.innerHTML = `
      <div class="alert alert-error" style="margin-top:2rem;">The event you're looking for doesn't exist or may have been removed.</div>
      <a href="events.html" class="btn">Back to Events</a>
    `;
  } else {
    document.getElementById("evtTitle").textContent = event.icon + "  " + event.title;
    document.getElementById("evtTag").innerHTML = `<span class="${tagClass(event.category)}" style="background:rgba(255,255,255,0.18);color:#fff;">${event.category} Event</span>`;

    const seatsLeft = DB.seatsLeft(event);

    container.innerHTML = `
      <div class="details-grid">
        <div>
          <div class="info-card">
            <h1 class="event-title">${event.title}</h1>
            <p class="college-name">
              ${event.college || ""}
              </p>
              <h3 style="margin-bottom:.8rem;">About this Event</h3>
              <p>${event.description}</p>
              </div>
          <div style="margin-top:1rem;">
            <a href="events.html" class="btn btn-secondary">&larr; Back to All Events</a>
          </div>
        </div>
        <div>
          <div class="info-card">
            <div class="info-row"><span>Date</span><span>${formatDate(event.date)}</span></div>
            <div class="info-row"><span>Time</span><span>${event.time}</span></div>
            <div class="info-row"><span>Venue</span><span>${event.venue}</span></div>
            <div class="info-row"><span>Category</span><span>${event.category}</span></div>
            <div class="info-row"><span>Total Seats</span><span>${event.seats}</span></div>
            <div class="info-row"><span>Seats Left</span><span>${seatsLeft > 0 ? seatsLeft : "Full"}</span></div>
          </div>
          ${
            seatsLeft > 0
            ? `<a href="register.html?id=${event.id}" class="btn" style="width:100%;text-align:center;display:block;">Register for this Event</a>`
            : `<div class="alert alert-error" style="text-align:center;">Registrations Closed - Event Full</div>`
          }
        </div>
      </div>
    `;
  }
</script>
</body>
</html>
